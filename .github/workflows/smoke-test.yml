name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every hour so tests are continuous
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    name: Serve & Smoke Test
    runs-on: ubuntu-latest

    env:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
      MAIL_MAILER: log
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      BCRYPT_ROUNDS: 4

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. PHP 8.2 + required extensions
      # ──────────────────────────────────────────────────────────────
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: >-
            pdo, pdo_sqlite, sqlite3, mbstring, exif, bcmath,
            fileinfo, gd, zip, xml, curl, intl, tokenizer, ctype,
            json, openssl
          coverage: none

      # ──────────────────────────────────────────────────────────────
      # 3. Node.js
      # ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ──────────────────────────────────────────────────────────────
      # 4. PHP dependencies
      # ──────────────────────────────────────────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ──────────────────────────────────────────────────────────────
      # 5. Node / front-end assets
      # ──────────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build front-end assets
        run: npm run build

      # ──────────────────────────────────────────────────────────────
      # 6. Environment configuration
      # ──────────────────────────────────────────────────────────────
      - name: Copy .env.example to .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Override CI-specific env vars
        run: |
          php artisan config:clear
          echo "DB_DATABASE=${{ github.workspace }}/database/database.sqlite" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "BCRYPT_ROUNDS=4" >> .env
          echo "SESSION_DRIVER=database" >> .env
          echo "CACHE_STORE=database" >> .env

      # ──────────────────────────────────────────────────────────────
      # 7. SQLite database + storage permissions
      # ──────────────────────────────────────────────────────────────
      - name: Create SQLite database file
        run: touch ${{ github.workspace }}/database/database.sqlite

      - name: Fix storage & bootstrap/cache permissions
        run: |
          chmod -R 775 storage bootstrap/cache
          php artisan storage:link --quiet || true

      # ──────────────────────────────────────────────────────────────
      # 8. Migrate & seed (includes admin user + demo content)
      # ──────────────────────────────────────────────────────────────
      - name: Run migrations and seed database
        run: php artisan migrate --force --seed

      # ──────────────────────────────────────────────────────────────
      # 9. Start Laravel dev server in background
      # ──────────────────────────────────────────────────────────────
      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 \
            > /tmp/laravel-serve.log 2>&1 &
          # Wait until the server responds (up to 30 s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000 > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done
          # Final check
          curl -sf http://127.0.0.1:8000 > /dev/null || \
            { echo "ERROR: Server did not start"; cat /tmp/laravel-serve.log; exit 1; }

      # ──────────────────────────────────────────────────────────────
      # 10. Smoke tests
      # ──────────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: |
          BASE="http://127.0.0.1:8000"
          PASS=0
          FAIL=0

          # Helper: assert HTTP status code
          check_status() {
            local label="$1"
            local expected="$2"
            local actual="$3"
            if [ "$actual" -eq "$expected" ]; then
              echo "  PASS  [${actual}] ${label}"
              PASS=$((PASS + 1))
            else
              echo "  FAIL  [${actual} != ${expected}] ${label}"
              FAIL=$((FAIL + 1))
            fi
          }

          # Helper: GET request
          get_status() {
            curl -s -o /dev/null -w "%{http_code}" \
              -L --max-redirs 5 \
              -c /tmp/smoke-cookies.txt -b /tmp/smoke-cookies.txt \
              "$1"
          }

          # Helper: GET without following redirects
          get_status_no_follow() {
            curl -s -o /dev/null -w "%{http_code}" \
              -c /tmp/smoke-cookies.txt -b /tmp/smoke-cookies.txt \
              "$1"
          }

          echo "=== Public Routes ==="

          check_status "GET /" 200 "$(get_status ${BASE}/)"
          check_status "GET /about" 200 "$(get_status ${BASE}/about)"
          check_status "GET /services" 200 "$(get_status ${BASE}/services)"
          check_status "GET /services/equipment-rental" 200 "$(get_status ${BASE}/services/equipment-rental)"
          check_status "GET /blog" 200 "$(get_status ${BASE}/blog)"
          check_status "GET /blog/kanggui-rcm-expands-fleet" 200 "$(get_status ${BASE}/blog/kanggui-rcm-expands-fleet)"
          check_status "GET /careers" 200 "$(get_status ${BASE}/careers)"
          check_status "GET /careers/heavy-equipment-mechanic" 200 "$(get_status ${BASE}/careers/heavy-equipment-mechanic)"
          check_status "GET /contact" 200 "$(get_status ${BASE}/contact)"

          echo ""
          echo "=== Public Forms ==="

          # ── POST /contact ───────────────────────────────────────────
          # Fetch CSRF token from contact page
          CSRF_TOKEN=$(curl -s -c /tmp/smoke-cookies.txt "${BASE}/contact" \
            | grep -oP '(?<=name="_token" value=")[^"]+' | head -1)
          CONTACT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${BASE}/contact" \
            -c /tmp/smoke-cookies.txt -b /tmp/smoke-cookies.txt \
            -d "_token=${CSRF_TOKEN}" \
            -d "name=Test+User" \
            -d "email=test@example.com" \
            -d "phone=1234567890" \
            -d "subject=Smoke+Test+Inquiry" \
            -d "message=This+is+a+smoke+test+contact+message+from+CI.")
          # Expect 302 redirect back (or 200 if it re-renders)
          if [ "$CONTACT_STATUS" -eq 302 ] || [ "$CONTACT_STATUS" -eq 200 ]; then
            echo "  PASS  [${CONTACT_STATUS}] POST /contact"
            PASS=$((PASS + 1))
          else
            echo "  FAIL  [${CONTACT_STATUS}] POST /contact"
            FAIL=$((FAIL + 1))
          fi

          # ── POST /careers/{slug}/apply ───────────────────────────────
          # Create a dummy PDF file for the resume upload
          echo "%PDF-1.4 dummy" > /tmp/dummy-resume.pdf
          CAREER_CSRF=$(curl -s -c /tmp/smoke-cookies2.txt \
            "${BASE}/careers/heavy-equipment-mechanic" \
            | grep -oP '(?<=name="_token" value=")[^"]+' | head -1)
          APPLY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${BASE}/careers/heavy-equipment-mechanic/apply" \
            -c /tmp/smoke-cookies2.txt -b /tmp/smoke-cookies2.txt \
            -F "_token=${CAREER_CSRF}" \
            -F "name=Test Applicant" \
            -F "email=applicant@example.com" \
            -F "phone=9876543210" \
            -F "message=I am interested in this position." \
            -F "resume=@/tmp/dummy-resume.pdf;type=application/pdf")
          if [ "$APPLY_STATUS" -eq 302 ] || [ "$APPLY_STATUS" -eq 200 ]; then
            echo "  PASS  [${APPLY_STATUS}] POST /careers/heavy-equipment-mechanic/apply"
            PASS=$((PASS + 1))
          else
            echo "  FAIL  [${APPLY_STATUS}] POST /careers/heavy-equipment-mechanic/apply"
            FAIL=$((FAIL + 1))
          fi

          echo ""
          echo "=== Admin Panel ==="

          # ── GET /admin unauthenticated → redirect to /admin/login ──
          ADMIN_UNAUTH=$(get_status_no_follow "${BASE}/admin")
          if [ "$ADMIN_UNAUTH" -eq 302 ] || [ "$ADMIN_UNAUTH" -eq 301 ]; then
            echo "  PASS  [${ADMIN_UNAUTH}] GET /admin (unauthenticated → redirect)"
            PASS=$((PASS + 1))
          else
            echo "  FAIL  [${ADMIN_UNAUTH} != 30x] GET /admin unauthenticated"
            FAIL=$((FAIL + 1))
          fi

          # ── GET /admin/login ────────────────────────────────────────
          LOGIN_STATUS=$(curl -s -o /tmp/login-page.html -w "%{http_code}" \
            -c /tmp/admin-cookies.txt \
            "${BASE}/admin/login")
          check_status "GET /admin/login" 200 "$LOGIN_STATUS"

          # ── POST /admin/login ───────────────────────────────────────
          ADMIN_CSRF=$(grep -oP '(?<=name="_token" value=")[^"]+' /tmp/login-page.html | head -1)
          LOGIN_POST=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${BASE}/admin/login" \
            -c /tmp/admin-cookies.txt -b /tmp/admin-cookies.txt \
            -d "_token=${ADMIN_CSRF}" \
            -d "email=admin@kangganui-rcm.com" \
            -d "password=password")
          if [ "$LOGIN_POST" -eq 302 ] || [ "$LOGIN_POST" -eq 200 ]; then
            echo "  PASS  [${LOGIN_POST}] POST /admin/login"
            PASS=$((PASS + 1))
          else
            echo "  FAIL  [${LOGIN_POST}] POST /admin/login"
            FAIL=$((FAIL + 1))
          fi

          # ── Authenticated admin pages ───────────────────────────────
          ADMIN_PAGES=(
            "/admin"
            "/admin/services"
            "/admin/posts"
            "/admin/job-listings"
            "/admin/job-applications"
            "/admin/contacts"
            "/admin/leads"
            "/admin/categories"
            "/admin/newsletters"
            "/admin/menus"
            "/admin/menu-items"
            "/admin/blocks"
            "/admin/page-blocks"
            "/admin/themes"
          )

          for page in "${ADMIN_PAGES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -L --max-redirs 5 \
              -c /tmp/admin-cookies.txt -b /tmp/admin-cookies.txt \
              "${BASE}${page}")
            check_status "GET ${page} (authenticated)" 200 "$STATUS"
          done

          echo ""
          echo "════════════════════════════════"
          echo "Results: ${PASS} passed, ${FAIL} failed"
          echo "════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "Some smoke tests failed. Check server log below:"
            echo "--- Laravel serve log ---"
            cat /tmp/laravel-serve.log || true
            echo "--- Laravel application log ---"
            cat storage/logs/laravel.log | tail -100 || true
            exit 1
          fi

      # ──────────────────────────────────────────────────────────────
      # 11. Upload logs as artifact if anything failed
      # ──────────────────────────────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: |
            storage/logs/laravel.log
            /tmp/laravel-serve.log
          retention-days: 7
